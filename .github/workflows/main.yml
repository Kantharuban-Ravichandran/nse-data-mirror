name: Daily NSE Update

on:
  schedule:
    - cron: '00 11 * * 1-5' # 4:30 PM IST
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Explicitly adding permissions here as a double-check
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated from v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated from v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run update script
        run: python update_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latest_bhavcopy.csv
          git commit -m "Update NSE data: $(date)" || echo "No changes to commit"
          git push
